<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Información - Localizador IoT</title>
  <link rel="stylesheet" href="styles/info.css">
</head>
<body>

<header class="header">
  <div class="nav-inner">
    <div class="nav-links">
      <a href="index.html">Mapa</a>
      <a href="info.html" class="active">Información</a>
      <a href="option.html">SOS</a>
    </div>
  </div>
</header>

<div class="info-page">

  <div class="layout">

    <!-- INFORMACIÓN -->
    <div class="content">

      <div class="card">
        <h3>Datos de Ubicación</h3>
        <div class="row"><span>Latitud</span><span id="lat"></span></div>
        <div class="row"><span>Longitud</span><span id="lng"></span></div>
        <div class="row"><span>Dirección</span><span id="dir"></span></div>
        <div class="row"><span>Calle / Carrera</span><span id="via"></span></div>
        <div class="row"><span>Número</span><span id="num"></span></div>
        <div class="row"><span>Ciudad</span><span id="city"></span></div>
      </div>

      <div class="card">
        <h3>Datos adicionales</h3>
        <div class="row"><span>Precisión GPS</span><span>Alta</span></div>
        <div class="row"><span>Última actualización</span><span id="time"></span></div>
        <div class="row"><span>Estado</span><span>Activo</span></div>
      </div>

    </div>

    <!-- IMAGEN -->
    <div class="side-image">
      <img src="img/Ciego.png" alt="Persona con bastón">
    </div>

  </div>

</div>

<script src="js/info.js"></script>

</body>
</html>
