<!DOCTYPE html>
<html lang="es">

  <link rel="stylesheet" href="styles/styles.css">

<body>

<header class="header">
  <div class="nav-inner">

      <a href="option.html">SOS</a>
    </div>

<div class="hero">
  <div id="map"></div>

  <div class="info-bar">
    <div class="info-item">
      <span>Latitud</span>
      <span id="lat">--</span>
    </div>

      <span id="lng">--</span>
    </div>

    <div class="info-item">
      <span>Dirección</span>
      <span id="address">--</span>
    </div>

    <div class="search-btn" onclick="centrar()">
      Buscar
    </div>
  </div>
</div>
